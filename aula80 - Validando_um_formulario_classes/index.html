<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <section class="container">
        <h1>Formulário de cadastro</h1>
        <ul>
            <li>Nenhum campo pode estar vazio</li>
            <li>Usuário não pode estar vazio</li>
            <li>Usuário deve ter de 3 a 12 caracteres</li>
            <li>Senha deve ter de 3 a 6 caracteres</li>
        </ul>
        <form action="/" method="post" class="formulario">
            <label>Nome</label>
            <input type="text" class="nome">
            <label>Sobrenome</label>
            <input type="text" class="sobrenome">
            <label>CPF</label>
            <input type="text" class="cpf">
            <label>Usuario</label>
            <input type="text" class="nome">
            <label>Senha</label>
            <input type="password" class="password">
            <label>Repetir Senha</label>
            <input type="password" class="repeat-password">
            <button type="submit">Enviar</button>
        </form>
    </section>
</body>
</html>
